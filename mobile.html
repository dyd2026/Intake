<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Document Secure Upload</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .card {
            background: white;
            padding: 35px 25px; /* Increased padding for better mobile framing */
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-placeholder {
            font-size: 1.6rem; /* Slightly larger header */
            font-weight: bold;
            color: #0076a3;
            margin-bottom: 15px;
        }

        /* Enhanced readability for senior/anti-tech callers */
        p {
            font-size: 1.2rem; /* Boosted from 1rem so no one has to squint */
            color: #444;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Giant senior-friendly target button */
        .camera-btn {
            background-color: #0076a3;
            color: white;
            border: none;
            width: 95px;  /* Enlarged from 80px for an easier target */
            height: 95px; /* Enlarged from 80px for an easier target */
            border-radius: 50%;
            font-size: 2.5rem; /* Bigger camera emoji icon */
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,118,163,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            transition: transform 0.1s ease;
        }

        .camera-btn:active {
            transform: scale(0.95);
        }

        .btn-label {
            font-weight: bold;
            color: #0076a3;
            font-size: 1.2rem; /* Boosted from 1.1rem */
            margin-bottom: 20px;
        }

        /* Hidden file input that triggers native camera */
        #cameraInput {
            display: none;
        }

        /* Larger status box with better padding to avoid micro-text */
        .status-message {
            margin-top: 20px;
            font-size: 1.1rem; /* Boosted from 0.9rem to prevent mobile browser auto-zooming */
            font-weight: 600;
            line-height: 1.5;
            white-space: pre-line;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 6px;
        }

        .success { 
            color: #155724; 
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .error { 
            color: #721c24; 
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-placeholder">Secure Upload</div>
    <p>Tap the camera below to take a photo of your pet's <strong>Rabies Certificate</strong>.</p>
    
    <label for="cameraInput" class="camera-btn">
        📸
    </label>
    <div class="btn-label">Tap to Snap Photo</div>

    <input type="file" id="cameraInput" accept="image/*" capture="camera">

    <div id="uploadStatus" class="status-message">Connecting to agent...</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    const cameraInput = document.getElementById('cameraInput');
    const uploadStatus = document.getElementById('uploadStatus');

    // Extract your Mac's unique WebRTC Station ID from the URL Hash
    const targetMacId = window.location.hash.substring(1);

    if (!targetMacId) {
        uploadStatus.className = "status-message error";
        uploadStatus.innerText = "Error: Invalid link. Please check with support agent.";
    } else {
        // Initialize an ephemeral phone client session
        const peer = new Peer();
        
        peer.on('open', () => {
            // Instantly open a direct digital tunnel to your MacBook
            const conn = peer.connect(targetMacId);
            
            conn.on('open', () => {
                uploadStatus.className = "status-message success";
                uploadStatus.innerText = "Connected to Secure Stream!\nReady to snap photo.";
                
                // When the customer finishes snapping the document picture
                cameraInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    uploadStatus.className = "status-message";
                    uploadStatus.innerText = "Compressing document and sending...";

                    const reader = new FileReader();
                    reader.onload = function(event) {
                        // Optimize raw dimensions through an image canvas element to save mobile bandwidth
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1200; // Scaled cleanly for clear text verification
                            let width = img.width;
                            let height = img.height;

                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            // High-efficiency transmission package
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                            
                            // Send it directly to your MacBook over WebRTC data lane
                            conn.send({ image: compressedDataUrl });
                            
                            uploadStatus.className = "status-message success";
                            uploadStatus.innerText = "✓ Sent Successfully!\nYour agent has received it.";
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            });

            conn.on('error', (err) => {
                uploadStatus.className = "status-message error";
                uploadStatus.innerText = "Connection lost. Please stay on the line with agent.";
            });
        });
    }
</script>
</body>
</html>
