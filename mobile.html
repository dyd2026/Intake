<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocuPet Document Secure Upload</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-placeholder {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0076a3;
            margin-bottom: 10px;
        }

        p {
            font-size: 1rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* The giant senior-friendly target button */
        .camera-btn {
            background-color: #0076a3;
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,118,163,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            transition: transform 0.1s ease;
        }

        .camera-btn:active {
            transform: scale(0.95);
        }

        .btn-label {
            font-weight: bold;
            color: #0076a3;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* Hidden file input that triggers native camera */
        #cameraInput {
            display: none;
        }

        .status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

    <div class="logo-placeholder">DocuPet Secure Upload</div>
    <p>Tap the camera below to take a photo of your pet's <strong>Rabies Certificate</strong>.</p>
    
    <label for="cameraInput" class="camera-btn">
        📸
    </label>
    <div class="btn-label">Tap to Snap Photo</div>

    <input type="file" id="cameraInput" accept="image/*" capture="camera">

    <div id="uploadStatus" class="status-message"></div>
</div>
